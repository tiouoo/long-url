<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>无效的长链接 — 长链接生成器</title>
    <style>
        :root {
            --bg: #f6f8fb;
            --card: #fff;
            --muted: #6b7280;
            --accent: #2563eb
        }

        * {
            box-sizing: border-box
        }

        body {
            margin: 0;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
            background: linear-gradient(180deg, var(--bg), #ffffff);
            color: #0f172a
        }

        .wrap {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px
        }

        .card {
            width: 100%;
            max-width: 760px;
            background: var(--card);
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(16, 24, 40, 0.06);
            padding: 28px;
            text-align: center
        }

        h1 {
            margin: 0 0 8px;
            font-size: 20px;
            color: #b91c1c
        }

        p.lead {
            margin: 0 0 18px;
            color: var(--muted)
        }

        .btn {
            display: inline-block;
            margin-top: 12px;
            padding: 10px 14px;
            border-radius: 8px;
            background: var(--accent);
            color: #fff;
            text-decoration: none;
            font-weight: 600
        }

        .hint {
            margin-top: 8px;
            color: var(--muted);
            font-size: 13px
        }
    </style>
</head>

<body>
    <div class="wrap">
        <div class="card">
            <h1>无效或不可识别的长链接</h1>
            <p class="lead">无法解码或验证访问的长链接,可能它已损坏或不是由本工具生成</p>
            <a class="btn" href="/">返回首页并重新生成</a>
        </div>
    </div>
</body>

</html>
