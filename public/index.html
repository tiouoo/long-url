<!doctype html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>长链接生成器</title>
    <style>
        :root {
            --bg: #f6f8fb;
            --card: #fff;
            --muted: #6b7280;
            --accent: #2563eb
        }

        * {
            box-sizing: border-box
        }

        body {
            margin: 0;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
            background: linear-gradient(180deg, var(--bg), #ffffff);
            color: #0f172a
        }

        .wrap {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px
        }

        .card {
            width: 100%;
            max-width: 760px;
            background: var(--card);
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(16, 24, 40, 0.06);
            padding: 28px
        }

        h1 {
            margin: 0 0 8px;
            font-size: 20px
        }

        p.lead {
            margin: 0 0 18px;
            color: var(--muted)
        }

        .row {
            display: flex;
            gap: 12px
        }

        input[type="url"] {
            flex: 1;
            padding: 12px 14px;
            border: 1px solid #e6e9ef;
            border-radius: 8px;
            font-size: 15px
        }

        button {
            background: var(--accent);
            color: #fff;
            border: 0;
            padding: 10px 14px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer
        }

        button.secondary {
            background: #eef2ff;
            color: #1e293b
        }

        .out {
            margin-top: 18px;
            padding: 14px;
            border-radius: 8px;
            background: #f8fafc;
            border: 1px solid #eef2f6;
            display: flex;
            gap: 8px;
            align-items: center
        }

        .out input {
            border: 0;
            background: transparent;
            flex: 1;
            font-size: 14px;
            color: #064e3b
        }

        .meta {
            margin-top: 12px;
            color: var(--muted);
            font-size: 13px
        }

        .controls {
            display: flex;
            gap: 8px
        }

        input {
            outline: none;
        }

        .hint {
            font-size: 12px;
            color: #9ca3af
        }

        footer {
            margin-top: 16px;
            color: var(--muted);
            font-size: 13px
        }
    </style>
</head>

<body>
    <div class="wrap">
        <div class="card">
            <h1>长链接生成器</h1>
            <p class="lead">把任意 Url 转换为一个"长链接"编码, 访问后会恢复并重定向到原始地址</p>

            <div class="row">
                <input id="inputUrl" type="url" placeholder="https://example.com" />
                <button id="genBtn">生成长链接</button>
            </div>

            <p id="error" style="margin: 0;margin-top: 10px;color: red; font-size: 14px;display: none;">错误: 无效的 url</p>

            <div class="out" id="outBox" style="display:none">
                <input id="outLink" readonly />
                <div class="controls">
                    <button id="copyBtn" class="secondary">复制</button>
                    <button id="openBtn">打开</button>
                </div>
            </div>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const inputUrl = document.getElementById('inputUrl');
            const error = document.getElementById('error');
            const genBtn = document.getElementById('genBtn');
            const outBox = document.getElementById('outBox');
            const outLink = document.getElementById('outLink');
            const copyBtn = document.getElementById('copyBtn');
            const openBtn = document.getElementById('openBtn');

            // 处理 URL 缩短逻辑
            genBtn.addEventListener('click', () => {
                error.style.display = 'none';
                var longUrl = inputUrl.value;
                longUrl = longUrl.trim();

                if (!longUrl) {
                    error.style.display = 'block';
                    outBox.style.display = 'none';
                    return;
                }

                if (!longUrl.startsWith("http://") && !longUrl.startsWith("https://")) {
                    longUrl = "http://" + longUrl;
                }

                try {
                    const encodedUrl = encodeToBase2(longUrl);
                    const shortUrl = `${window.location.origin}/${encodedUrl}`;
                    outLink.value = shortUrl;
                    outBox.style.display = 'flex'; // 显示结果框
                } catch (e) {
                    error.style.display = 'block';
                    console.error('Encoding error:', e);
                    outBox.style.display = 'none';
                }
            });

            // 复制按钮逻辑
            copyBtn.addEventListener('click', () => {
                outLink.select();
                outLink.setSelectionRange(0, 99999); // For mobile devices
                document.execCommand('copy');
            });

            // 打开按钮逻辑
            openBtn.addEventListener('click', () => {
                const shortUrl = outLink.value;
                if (shortUrl) {
                    window.open(shortUrl, '_blank');
                }
            });


            // Base2 编码函数 (0 -> o, 1 -> O)
            function encodeToBase2(str) {
                const encoder = new TextEncoder();
                const data = encoder.encode(str);
                let binaryString = '';
                for (let i = 0; i < data.length; i++) {
                    binaryString += data[i].toString(2).padStart(8, '0');
                }
                return binaryString.replace(/0/g, 'i').replace(/1/g, 'I');
            }
        });
    </script>
</body>

</html>
