<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="./icon.svg" />
    <script
      charset="UTF-8"
      id="LA_COLLECT"
      src="//sdk.51.la/js-sdk-pro.min.js"
    ></script>
    <script>
      LA.init({
        id: "Kqedlvz2C7T8YuVc",
        ck: "Kqedlvz2C7T8YuVc",
        autoTrack: true,
        hashMode: true,
      });
    </script>
    <script
      defer
      src="https://umami.tiouo.xyz/script.js"
      data-website-id="3ebea859-9819-4a12-87bd-0c8d61f92c5f"
    ></script>
    <title>长链接生成器</title>
    <style>
      body {
        height: 100vh;
        width: 100vw;
        display: flex;
        overflow: hidden;
        margin: 0;
      }
      @font-face {
        font-family: "ZhuZiAYuanJWD";
        src: url("./ZhuZiAWan.woff2");
        font-display: swap;
        font-weight: lighter;
      }
      * {
        font-family: "ZhuZiAYuanJWD" !important;
      }
      :root {
        --green: #22c55e;
        --red: #ef4444;
      }

      :root {
        --bg: #f8fafc;
        --card-bg: #ffffff;
        --card-bg-hover: #f0f4f8;
        --card-radius: 12px;
        --card-border: #e5e7eb 1px solid;
        --text-color: #4c4948;
        --text-color-light: #64748b;
        --scrollbar-thumb: #49b1f5;
      }

      button {
        color: var(--text-color) !important;
        display: flex;
        background-color: var(--card-bg);
        align-items: center !important;
        border: var(--card-border);
        border-radius: var(--card-radius);
        padding: 10px 14px;
        cursor: pointer;
        font-size: 14px !important;
        text-align: center;
        align-content: center;
        display: flex;
        justify-content: center;
      }
      button:hover {
        background-color: var(--card-bg-hover);
      }
      button:disabled {
        opacity: 0.4 !important;
        cursor: not-allowed !important;
      }
      .x-s-btn {
        color: white !important;
        background: #10b981 !important;
      }
      .x-s-btn:hover:not(:disabled) {
        background: #059669 !important;
      }
      .x-a-btn {
        color: white !important;
        background: #667eea !important;
      }
      .x-a-btn:hover:not(:disabled) {
        background: #5568d3 !important;
      }
      .x-e-btn {
        background: #ef4444 !important;
        color: white !important;
      }
      .x-e-btn:hover:not(:disabled) {
        background: #dc2626 !important;
      }
      .card {
        background-color: var(--card-bg);
        border: var(--card-border);
        border-radius: var(--card-radius);
        padding: 12px 16px;
      }
      input {
        flex: 1;
        padding: 10px 14px;
        border: 1px solid #e6e9ef;
        border-radius: 12px;
        font-size: 14px !important;
        background: var(--card-bg, #fff) !important;
        color: var(--text-color, #0f172a) !important;
        cursor: pointer;
        transition: all 0.2s;
      }
      input:hover {
        background: var(--card-bg-hover) !important;
      }
      input:focus {
        outline: none;
        border-color: #667eea;
      }
      [data-theme="dark"] input {
        border-color: #334155;
      }
      .wrap {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        min-height: 100%;
        overflow: auto;
      }

      .card {
        width: 100%;
        max-width: 760px;
        background: var(--card-bg, #fff);
        border-radius: 12px;
        border: var(--card-border);
        padding: 28px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 20px;
        color: var(--text-color, #0f172a);
      }

      .lead {
        margin: 0 0 18px;
        color: var(--text-color-light, #6b7280);
        font-size: 14px;
      }

      .row {
        display: flex;
        gap: 12px;
      }

      [data-theme="dark"] button.secondary {
        background: #1e293b;
        color: #e2e8f0;
      }

      [data-theme="dark"] button.secondary:hover {
        background: #334155;
      }

      .error {
        margin: 10px 0 0;
        color: #dc2626;
        font-size: 14px;
      }

      .out {
        margin-top: 18px;
        padding: 14px 16px;
        border-radius: 12px;
        background: #f8fafc;
        border: 1px solid #eef2f6;
        display: flex;
        gap: 8px;
        align-items: center;
      }

      [data-theme="dark"] .out {
        background: #1e293b;
        border-color: #334155;
      }

      .out-link {
        border: 0;
        background: transparent;
        flex: 1;
        font-size: 14px;
        color: #064e3b;
        outline: none;
        resize: none;
        line-height: 1.5;
        overflow-y: auto;
      }

      [data-theme="dark"] .out-link {
        color: #86efac;
      }

      .controls {
        display: flex;
        gap: 8px;
      }
    </style>
  </head>

  <body>
    <div class="wrap">
      <div class="card">
        <h1>长链接生成器</h1>
        <div class="row">
          <input
            id="inputUrl"
            type="url"
            placeholder="https://example.com"
            class="url-input"
          />
          <button onclick="generateLongLink()" class="x-a-btn">
            生成长链接
          </button>
        </div>

        <div id="output" style="display: none" class="out">
          <textarea id="shortUrl" readonly class="out-link" rows="2"></textarea>
          <div class="controls">
            <button onclick="copyToClipboard()" class="secondary x-s-btn">
              复制
            </button>
            <button onclick="openLink()" class="x-a-btn">打开</button>
          </div>
        </div>
      </div>
    </div>

    <script>
      let inputUrl = "";
      let shortUrl = "";
      let errorMsg = "";

      // Base2 编码函数 (0 -> i, 1 -> I)
      function encodeToBase2(str) {
        const encoder = new TextEncoder();
        const data = encoder.encode(str);
        let binaryString = "";

        for (let i = 0; i < data.length; i++) {
          binaryString += data[i].toString(2).padStart(8, "0");
        }

        return binaryString.replace(/0/g, "i").replace(/1/g, "I");
      }

      const generateLongLink = () => {
        errorMsg = "";
        inputUrl = document.getElementById("inputUrl").value.trim();

        if (!inputUrl) {
          alert("错误: 无效的 url");
          shortUrl = "";
          document.getElementById("output").style.display = "none";
          return;
        }

        if (
          !inputUrl.startsWith("http://") &&
          !inputUrl.startsWith("https://")
        ) {
          inputUrl = "http://" + inputUrl;
        }

        try {
          const encodedUrl = encodeToBase2(inputUrl);
          shortUrl = `https://lu.tiouo.xyz/${encodedUrl}`;
          document.getElementById("shortUrl").value = shortUrl;
          document.getElementById("output").style.display = "flex";
        } catch {
          alert("错误: 无效的 url");
          console.error("Encoding error");
          shortUrl = "";
          document.getElementById("output").style.display = "none";
        }
      };

      const copyToClipboard = async () => {
        try {
          await navigator.clipboard.writeText(shortUrl);
          alert("已复制到剪贴板");
        } catch {
          const input = document.createElement("input");
          input.value = shortUrl;
          document.body.appendChild(input);
          input.select();
          document.execCommand("copy");
          document.body.removeChild(input);
          alert("已复制到剪贴板");
        }
      };

      const openLink = () => {
        if (shortUrl) {
          window.open(shortUrl, "_blank");
        }
      };

      // 回车键触发生成
      document
        .getElementById("inputUrl")
        .addEventListener("keyup", function (event) {
          if (event.key === "Enter") {
            generateLongLink();
          }
        });
    </script>
  </body>
</html>
